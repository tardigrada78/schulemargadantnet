<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ideen-Brainstorming</title>
  <link rel="stylesheet" href="styles_synthwave.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.4.0/dist/mermaid.min.js"></script>
  <style>
    .personas-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .persona-check-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #1a1020;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .persona-check-label:hover {
      border-color: #06f;
    }

    .persona-check-label input[type="checkbox"] {
      flex-shrink: 0;
    }

    .persona-check-label.checked {
      border-color: #06f;
    }

    .persona-check-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .persona-check-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
    }

    .persona-card {
      background: #1a1020;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1.25rem;
      animation: fadeIn 0.4s ease;
    }

    .persona-card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      font-size: 1.05rem;
    }

    .persona-card-body {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #ccc;
    }

    .persona-card-body p,
    #synthesisContent p {
      margin: 0 0 0.5rem 0;
    }

    .persona-card-body ul,
    #synthesisContent ul {
      margin: 0 0 0.5rem 1.2rem;
      padding: 0;
    }

    .persona-card-body br,
    #synthesisContent br {
      display: block;
      margin-bottom: 0.25rem;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #444;
      border-top-color: #06f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .section-block {
      margin-top: 2.5rem;
      padding: 1.5rem;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 10px;
    }

    .section-block h2 {
      margin-top: 0;
      margin-bottom: 1rem;
    }

    #mindmapDiv svg {
      width: 100%;
      height: auto;
    }

    .select-all-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .btn-small {
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      background: #222;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-small:hover {
      border-color: #06f;
      color: #fff;
    }
  </style>
</head>

<body>
  <div id="site-header"></div>
  <script>
    fetch('/header.html').then(r => r.text()).then(h => document.getElementById('site-header').innerHTML = h);
  </script>

  <h1>💡 Ideen-Brainstorming</h1>
  <p>
    Gib ein Thema ein. Mehrere virtuelle Personen mit unterschiedlichen Perspektiven brainstormen parallel dazu –
    anschliessend werden alle Ideen zusammengeführt und als Mindmap visualisiert.
  </p>

  <label for="topicInput"><strong>Thema:</strong></label><br />
  <input type="text" id="topicInput" value="Ein veganes Kinder-Kochbuch" style="width: 100%; max-width: 600px;" /><br /><br />

  <strong>Perspektiven:</strong>
  <div class="select-all-row">
    <button class="btn-small" onclick="setAll(true)">Alle auswählen</button>
    <button class="btn-small" onclick="setAll(false)">Alle abwählen</button>
  </div>
  <div class="personas-grid" id="personasGrid"></div>

  <br />
  <button id="startBtn">💡 Brainstormen</button>
  <span id="globalStatus" style="margin-left: 1rem; color: #888; font-size: 0.9rem;"></span>

  <div id="resultsGrid" class="results-grid" style="display:none;"></div>

  <div id="synthesisBlock" class="section-block" style="display:none;">
    <h2>🔗 Synthese</h2>
    <div id="synthesisContent" style="line-height: 1.7;"></div>
  </div>

  <div id="mindmapBlock" class="section-block" style="display:none;">
    <h2>🗺️ Mindmap</h2>
    <div id="mindmapDiv"></div>
    <details style="margin-top: 1rem;">
      <summary style="cursor: pointer; color: #666; font-size: 0.8rem;">Mermaid-Code anzeigen</summary>
      <pre id="mindmapCode" style="font-size: 0.75rem; color: #888; margin-top: 0.5rem; white-space: pre-wrap;"></pre>
    </details>
  </div>

  <script type="module" src="ideas.js"></script>
</body>

</html>
